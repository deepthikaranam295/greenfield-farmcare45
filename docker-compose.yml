services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-greenfield_db}
      POSTGRES_USER:     ${POSTGRES_USER:-greenfield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greenfield}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend (serves API + React frontend) ──────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-greenfield}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-greenfield_db}
    ports:
      - "80:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

volumes:
  postgres_data:
